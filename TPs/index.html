<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet_final | E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TechStore</a>
            <button class="btn btn-primary position-relative" data-bs-toggle="modal" data-bs-target="#modalPanier">
                🛒 Mon Panier
                <span id="panier-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>
            </button>
        </div>
    </nav>

    <header class="py-5 text-center bg-white border-bottom shadow-sm mb-5">
        <h1 class="display-4 fw-bold">Catalogue Produits</h1>
        <p class="text-muted">Projet TP Technologies Web</p>
    </header>

    <main class="container">
        <div class="row g-4" id="liste-produits">
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://picsum.photos/id/1/300/200" class="card-img-top" alt="Laptop">
                    <div class="card-body text-center">
                        <h5 class="card-title">Ordinateur Ultra Portable</h5>
                        <p class="text-primary fw-bold">950 €</p>
                        <button class="btn btn-outline-primary btn-ajouter" data-id="1" data-nom="Laptop Ultra" data-prix="950">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://picsum.photos/id/20/300/200" class="card-img-top" alt="Clavier">
                    <div class="card-body text-center">
                        <h5 class="card-title">Clavier Mécanique QWERTZ</h5>
                        <p class="text-primary fw-bold">120 €</p>
                        <button class="btn btn-outline-primary btn-ajouter" data-id="2" data-nom="Clavier QWERTZ" data-prix="120">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100 border-0 shadow-sm">
                    <img src="https://picsum.photos/id/48/300/200" class="card-img-top" alt="Ecran">
                    <div class="card-body text-center">
                        <h5 class="card-title">Écran 4K Gaming</h5>
                        <p class="text-primary fw-bold">350 €</p>
                        <button class="btn btn-outline-primary btn-ajouter" data-id="3" data-nom="Ecran 4K" data-prix="350">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalPanier" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Votre Panier</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul id="panier-items" class="list-group mb-3">
                        </ul>
                    <div class="d-flex justify-content-between fw-bold border-top pt-2">
                        <span>Total :</span>
                        <span id="total-prix">0 €</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="viderPanier()">Vider</button>
                    <button type="button" class="btn btn-success">Valider la commande</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
