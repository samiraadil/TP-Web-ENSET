<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Site Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Bienvenue sur mon site</h1>
    <nav>
        <ul>
            <li><a href="#accueil">Accueil</a></li>
            <li><a href="#apropos">À propos</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<section id="accueil">
    <h2>Accueil</h2>
    <p>Ceci est ma première page web réalisée en HTML et CSS.</p>
    <img src="https://via.placeholder.com/300" alt="image">
</section>

<section id="apropos">
    <h2>À propos</h2>
    <p>Je suis étudiante en développement web.</p>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</section>

<section id="contact">
    <h2>Contact</h2>
    <form>
        <label>Nom :</label>
        <input type="text" name="nom"><br>

        <label>Email :</label>
        <input type="email" name="email"><br>

        <label>Message :</label><br>
        <textarea></textarea><br>

        <button type="submit">Envoyer</button>
    </form>
</section>

<footer>
    <p>© 2026 Mon Site Web</p>
</footer>

</body>
</html>
