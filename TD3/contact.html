<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réservation | Sam’s SKYWAYS</title>
    <style>
        :root { --gold: #c5a059; --dark: #02060c; --white: #f0f4f8; }
        body { background: var(--dark); color: var(--white); font-family: sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-around; padding: 25px; background: #000; border-bottom: 1px solid var(--gold); }
        nav a { color: white; text-decoration: none; font-weight: bold; font-size: 0.8rem; }
        .container { padding: 60px 10%; display: flex; gap: 40px; flex-wrap: wrap; }
        form { flex: 1; display: flex; flex-direction: column; gap: 15px; min-width: 300px; }
        input, select, textarea { padding: 12px; background: #050a14; border: 1px solid #333; color: white; }
        button { padding: 15px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; }
        .info { flex: 1; border: 1px solid var(--gold); padding: 20px; min-width: 300px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Accueil</a> <a href="about.html">Direction</a> <a href="services.html">Destinations</a> <a href="gallery.html">Flotte</a> <a href="contact.html">Contact</a>
    </nav>
    <div class="container">
        <form>
            <h2 style="color:var(--gold)">RÉSERVER UN VOL</h2>
            <input type="text" placeholder="Nom complet" required>
            <select required>
                <option value="">Choisir une destination de départ</option>
                <option>Casablanca (GMMN)</option>
                <option>Paris (LFPB)</option>
                <option>Dubaï (OMDW)</option>
                <option>New York (KTEB)</option>
            </select>
            <select required>
                <option value="">Choisir une destination d'arrivée</option>
                <option>Londres (EGLF)</option>
                <option>Genève (LSGG)</option>
                <option>Singapour (WSSL)</option>
                <option>Tokyo (RJTT)</option>
                <option>Los Angeles (KVNY)</option>
                <option>Riyad (OERK)</option>
            </select>
            <input type="date" required>
            <textarea placeholder="Demandes particulières (Catering, transfert...)"></textarea>
            <button type="submit">DEMANDER UN DEVIS</button>
        </form>
        <div class="info">
            <h3 style="color:var(--gold)">HUB PRINCIPAL</h3>
            <p>Aéroport Mohammed V, Terminal Privé VIP<br>Casablanca, Maroc</p>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3331.439527962657!2d-7.592182024227926!3d33.36746815396557!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xda6263593b4582f%3A0x6331908d132049e2!2sA%C3%A9roport%20international%20Mohammed%20V!5e0!3m2!1sfr!2sma!4v1700000000000" width="100%" height="250" style="border:0; filter: invert(90%);" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </div>
</body>
</html>
